# Canonical-domain redirect for plain HTTP.
# This is a complete top-level server block and must NOT be included inside another server block.
server {
    listen 80;
    listen [::]:80;
    server_name www.adagostay.pl;
    return 301 https://adagostay.pl$request_uri;
}

# HTTPS note:
# In the existing TLS-enabled server block for www.adagostay.pl (the one that already has
# ssl_certificate and ssl_certificate_key), add:
#     return 301 https://adagostay.pl$request_uri;
